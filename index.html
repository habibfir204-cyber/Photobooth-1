<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DIY Web Photo Booth Pro</title>
    
    <!-- Memuat Library AI untuk Memotong Background secara Real-time -->
    <script src="https://jsdelivr.net" crossorigin="anonymous"></script>

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: Arial, sans-serif;
        }
        #booth-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        video {
            display: none;
        }
        #live-canvas {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Menu Kontrol Atas (Pilih Kamera & Mode) */
        .top-controls {
            position: absolute;
            top: 20px;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: space-around;
            z-index: 15;
            padding: 0 10px;
        }
        .control-select {
            padding: 10px 15px;
            border-radius: 20px;
            border: 2px solid white;
            background: rgba(0,0,0,0.6);
            color: white;
            font-size: 14px;
            font-weight: bold;
            outline: none;
        }

        /* Tombol Utama (Aksi) */
        #action-btn {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            width: 75px;
            height: 75px;
            background-color: #ffffff;
            border: 5px solid rgba(0,0,0,0.3);
            border-radius: 50%;
            cursor: pointer;
            z-index: 10;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            font-size: 12px;
        }
        #action-btn.recording {
            background-color: #ff4d4d !important;
            animation: pulse 1s infinite;
        }
        @keyframes pulse {
            0% { transform: translateX(-50%) scale(1); }
            50% { transform: translateX(-50%) scale(1.1); }
            100% { transform: translateX(-50%) scale(1); }
        }

        /* Tampilan Timer Hitung Mundur / Perekaman */
        #status-overlay {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 80px;
            font-weight: bold;
            text-shadow: 0px 4px 10px rgba(0,0,0,0.8);
            z-index: 12;
            pointer-events: none;
        }

        /* Jendela Pop-up Preview */
        #preview-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.95);
            z-index: 20;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        #preview-img, #preview-video {
            display: none;
            max-width: 90%;
            max-height: 70%;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(255,255,255,0.2);
            margin-bottom: 20px;
        }
        .btn-container {
            display: flex;
            gap: 20px;
            width: 100%;
            justify-content: center;
        }
        .action-btn {
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            min-width: 120px;
        }
        #retake-btn { background-color: #ff4d4d; color: white; }
        #download-btn { background-color: #2ecc71; color: white; }
    </style>
</head>
<body>

    <div id="booth-container">
        <!-- Kontrol Pilihan Kamera & Mode -->
        <div class="top-controls">
            <select id="camera-select" class="control-select" onchange="restartCamera()">
                <option value="user">Kamera Depan</option>
                <option value="environment">Kamera Belakang</option>
            </select>
            <select id="mode-select" class="control-select" onchange="updateModeUI()">
                <option value="photo">Mode Foto</option>
                <option value="video">Mode Video (5s)</option>
            </select>
        </div>

        <video id="webcam" autoplay playsinline></video>
        <canvas id="live-canvas"></canvas>
        <div id="status-overlay">3</div>
        <button id="action-btn" onclick="startCapture()"></button>
    </div>

    <!-- Pop-up Pilihan Simpan atau Ulangi -->
    <div id="preview-modal">
        <h3 id="preview-title" style="color: white; margin-bottom: 15px;">Simpan Hasil?</h3>
        <img id="preview-img" src="" alt="Hasil Foto">
        <video id="preview-video" controls autoplay loop playsinline></video>
        
        <div class="btn-container">
            <button id="retake-btn" class="action-btn" onclick="closePreview()">Ulangi</button>
            <button id="download-btn" class="action-btn" onclick="triggerDownload()">Simpan</button>
        </div>
    </div>

    <script>
        const video = document.getElementById('webcam');
        const liveCanvas = document.getElementById('live-canvas');
        const liveCtx = liveCanvas.getContext('2d');
        const cameraSelect = document.getElementById('camera-select');
        const modeSelect = document.getElementById('mode-select');
        const actionBtn = document.getElementById('action-btn');
        const statusOverlay = document.getElementById('status-overlay');
        
        const previewModal = document.getElementById('preview-modal');
        const previewImg = document.getElementById('preview-img');
        const previewVideo = document.getElementById('preview-video');
        
        let currentStream = null;
        let finalBlob = null;
        let isPhotoResult = true;
        let mediaRecorder = null;
        let recordedChunks = [];

        // Ambil file template.png dari satu folder yang sama di GitHub
        const templateImg = new Image();
        templateImg.src = 'template.png';

        // Inisialisasi AI Segmentasi Google MediaPipe
        const selfieSegmentation = new SelfieSegmentation({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/selfie_segmentation/${file}`
        });
        selfieSegmentation.setOptions({ modelSelection: 1 });
        selfieSegmentation.onResults(onSegmentationResults);

        // 1. Mengaktifkan Kamera Berdasarkan Pilihan User
        function startCamera() {
            if (currentStream) {
                currentStream.getTracks().forEach(track => track.stop());
            }

            const facing = cameraSelect.value; // "user" atau "environment"
            
            navigator.mediaDevices.getUserMedia({ 
                video: { 
                    facingMode: facing, 
                    width: { ideal: 1080 },
                    height: { ideal: 1920 }
                }, 
                audio: modeSelect.value === 'video' // Aktifkan audio jika mode video
            })
            .then(function(stream) {
                currentStream = stream;
                video.srcObject = stream;
            })
            .catch(function(err) {
                alert("Gagal mengakses kamera. Mohon ganti izin di pengaturan browser.");
            });
        }

        // Loop frame AI
        video.addEventListener('loadedmetadata', () => {
            async function updateFrame() {
                if (!video.paused && !video.ended) {
                    await selfieSegmentation.send({ image: video });
                }
                requestAnimationFrame(updateFrame);
            }
            requestAnimationFrame(updateFrame);
        });

        function restartCamera() {
            startCamera();
        }

        function updateModeUI() {
            startCamera(); // Refresh mic state
        }

        // 2. Pemrosesan Efek Green-Screen (Orang didepan, Template dibelakang)
        function onSegmentationResults(results) {
            if (liveCanvas.width !== 1080) {
                liveCanvas.width = 1080;
                liveCanvas.height = 1920;
            }

            liveCtx.save();
            liveCtx.clearRect(0, 0, liveCanvas.width, liveCanvas.height);

            // Lapisan 1: Gambar template.png di paling bawah
            if (templateImg.complete) {
                liveCtx.drawImage(templateImg, 0, 0, liveCanvas.width, liveCanvas.height);
            }

            // Lapisan 2 & 3: Masking AI untuk memotong siluet manusia
            liveCtx.globalCompositeOperation = 'destination-atop';
            liveCtx.drawImage(results.segmentationMask, 0, 0, liveCanvas.width, liveCanvas.height);

            liveCtx.globalCompositeOperation = 'source-in';
            
            let videoWidth = video.videoWidth;
            let videoHeight = video.videoHeight;
            let videoAspect = videoWidth / videoHeight;
            let canvasAspect = liveCanvas.width / liveCanvas.height;
            let drawWidth, drawHeight, drawX, drawY;

            if (videoAspect > canvasAspect) {
                drawHeight = liveCanvas.height;
                drawWidth = liveCanvas.height * videoAspect;
