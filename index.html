<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DIY Web Photo Booth</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #111;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
        }
        
        /* Kontainer Utama */
        #booth-container, #preview-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #preview-container {
            display: none;
            background-color: #000;
            z-index: 10;
            flex-direction: column;
        }

        /* --- SUSUNAN LAYER (Z-INDEX) --- */
        video {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: cover; 
            z-index: 1; 
        }

        #template-overlay {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: cover; 
            pointer-events: none; 
            z-index: 2; 
        }

        /* --- TOMBOL UI --- */
        #capture-btn {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            width: 75px;
            height: 75px;
            background-color: #ffffff;
            border: 5px solid rgba(0,0,0,0.3);
            border-radius: 50%;
            cursor: pointer;
            z-index: 5;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.5);
            transition: transform 0.1s;
        }
        #capture-btn:active {
            transform: translateX(-50%) scale(0.95);
        }

        #flip-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            padding: 10px 15px;
            background-color: rgba(0,0,0,0.6);
            color: white;
            border: 1px solid rgba(255,255,255,0.4);
            border-radius: 20px;
            cursor: pointer;
            z-index: 5;
            font-size: 14px;
            backdrop-filter: blur(5px);
        }

        /* Tampilan Hasil Akhir */
        #preview-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 11;
        }

        .action-buttons {
            position: absolute;
            bottom: 40px;
            z-index: 12;
            display: flex;
            gap: 20px;
        }

        .btn {
            padding: 15px 30px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        .btn-save { background-color: #4CAF50; color: white; }
        .btn-retake { background-color: #f44336; color: white; }

        canvas { display: none; }
    </style>
</head>
<body>

    <div id="booth-container">
        <video id="webcam" autoplay playsinline></video>
        <img id="template-overlay" src="template.png" alt="Template Frame">
        
        <button id="flip-btn" onclick="toggleCamera()">🔄 Balik Kamera</button>
        <button id="capture-btn" onclick="takeSnapshot()"></button>
    </div>

    <div id="preview-container">
        <img id="preview-image" src="" alt="Hasil Foto">
